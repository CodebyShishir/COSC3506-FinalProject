<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SplitEase - Smart Expense Splitting</title>
    <meta name="description" content="SplitEase is a modern web application to easily split shared expenses with friends and track live balances.">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div class="glass-panel auth-wrapper" id="authBox">
        <h1 class="text-gradient">SplitEase</h1>
        <p class="text-muted" style="margin-bottom: 2rem;">Track shared expenses effortlessly.</p>

        <!-- Login Form -->
        <form id="loginForm">
            <h2>Welcome Back</h2>
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password" required>
            </div>
            <p class="toggle-auth" style="text-align: right; margin-top: -10px; margin-bottom: 15px;" onclick="showForgotPassword()">Forgot Password?</p>
            <button type="submit" class="btn" style="width: 100%;">Sign In</button>
            <p class="toggle-auth" onclick="showRegister()">New here? Create an account</p>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="hidden">
            <h2>Create Account</h2>
            <div class="form-group">
                <input type="text" id="regName" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Register</button>
            <p class="toggle-auth" onclick="showLogin()">Already have an account? Sign in</p>
        </form>

        <!-- Forgot Password Form -->
        <form id="forgotPasswordForm" class="hidden">
            <h2>Reset Password</h2>
            <p class="text-muted" style="margin-bottom: 1rem; font-size: 0.9rem;">Enter your email to reset the password.</p>
            <div class="form-group">
                <input type="email" id="forgotEmail" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" id="forgotNewPassword" placeholder="New Password" required>
            </div>
            <button type="submit" class="btn" style="width: 100%;">Reset Password</button>
            <p class="toggle-auth" onclick="showLogin()">Back to Sign In</p>
        </form>
        
        <div id="authError" class="badge badge-owed hidden" style="margin-top: 1rem;"></div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Simple UI togglers for the auth container
        function hideAllForms() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('forgotPasswordForm').classList.add('hidden');
            document.getElementById('authError').classList.add('hidden');
            document.getElementById('authError').classList.remove('badge-success'); // In case it was green
            document.getElementById('authError').classList.add('badge-owed');
        }

        function showLogin() {
            hideAllForms();
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showRegister() {
            hideAllForms();
            document.getElementById('registerForm').classList.remove('hidden');
        }

        function showForgotPassword() {
            hideAllForms();
            document.getElementById('forgotPasswordForm').classList.remove('hidden');
        }
    </script>
</body>
</html>
